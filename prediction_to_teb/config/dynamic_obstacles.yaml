# TEB plans in 2D. "box" and "polygon" are published as polygon footprints,
# while RViz displays their configured height.
obstacles:
  - id: 1
    name: square_route_cube
    shape: box
    size: [0.8, 0.8, 0.8]
    yaw_mode: fixed
    color: [0.95, 0.15, 0.10, 0.85]
    route:
      type: square
      center: [1.0, -1.0]
      size: [14.0, 2.0]
      speed: 2.0
      phase: 0.0

