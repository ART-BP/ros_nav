shutdown_costmaps: false

# NeuPAN compute_velocity currently takes about 0.12-0.16 s, so 10 Hz
# consistently overruns. Keep move_base aligned with the measured backend rate.
controller_frequency: 5.0
controller_patience: 30.0

planner_frequency: 0.0
planner_patience: 10.0

# NeuPAN can command low speed or short stops while optimizing. Disable the
# move_base oscillation abort for this adapter and let NeuPAN report arrival/stop.
oscillation_timeout: 0.0
oscillation_distance: 0.05

conservative_reset_dist: 3.0
recovery_behavior_enabled: false

recovery_behaviors:
  - name: 'clear_costmap'
    type: 'clear_costmap_recovery/ClearCostmapRecovery'

clear_costmap:
  reset_distance: 2.0

rotate_recovery:
  sim_granularity: 0.017
  frequency: 5.0
  acceleration_limit: 0.3
