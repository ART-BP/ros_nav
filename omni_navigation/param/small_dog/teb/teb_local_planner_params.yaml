TebLocalPlannerROS:

  ##################################
  # 1. Reference Frames & Topics
  ##################################
  odom_topic: /odometry/base          # (string) Topic to receive odometry (robot pose & velocity)
  map_frame: /map           # (string) Global reference frame for planning

  ##################################
  # 2. Trajectory Settings
  ##################################
  teb_autosize: true        # (bool) Allow TEB to automatically adjust the trajectory time horizon
  dt_ref: 0.3               # (double) Finer trajectory resolution reduces corner cutting
  dt_hysteresis: 0.03       # (double) Hysteresis [s] for adaptive time discretization (typically ~10% of dt_ref)
  exact_arc_length: false   # (bool) Use exact arc length computations (more accurate but slower)
  publish_feedback: false   # (bool) Publish optimization feedback to /move_base/feedback for external monitoring

  ##################################
  # 3. Global Plan Interaction
  ##################################
  global_plan_overwrite_orientation: true   # (bool) Ignore global path orientations; let TEB optimize yaw
  max_global_plan_lookahead_dist: 3.0       # (double) [m] Maximum lookahead distance to consider from global plan (<=0 disables)
  global_plan_prune_distance: 1.0          # (double) [m] Prune global plan points closer than this to the robot
  global_plan_viapoint_sep: 0.5              # (double) [m] Let the local planner leave a wall-hugging global line when clearance is available
  via_points_ordered: true                   # (bool) Follow global-plan via-points in their original order

  ##################################
  # 4. Feasibility & Initialization
  ##################################
  feasibility_check_no_poses: 10            # (int) Check enough upcoming poses to reject corner-cutting trajectories
  min_resolution_collision_check_angular: 0.15 # (double) [rad] Interpolate footprint checks during turns
  allow_init_with_backwards_motion: false    # (bool) Allow initial backward motion if goal lies behind (requires rear sensors)

  ##################################
  # 5. Robot Kinematics & Limits
  ##################################
  # 5.1 Differential / Omnidirectional Settings
  max_vel_x: 0.6               # (double) [m/s] Max forward velocity
  max_vel_x_backwards: 0.08     # (double) [m/s] Keep reverse motion slow so rotation/forward motion is preferred
  max_vel_y: 0.4              # (double) [m/s] Permit a timely lateral bypass while forward progress remains preferred
  max_vel_trans: 0.7           # (double) [m/s] Allow forward-plus-lateral dynamic avoidance without clipping both axes
  max_vel_theta: 0.9          # (double) [rad/s] Establish a safe forward heading before reaching corridor corners

  acc_lim_x: 2.0               # (double) [m/s²] Max acceleration in x-direction
  acc_lim_y: 1.5               # (double) [m/s²] Reach lateral clearance before a moving obstacle reaches the encounter point
  acc_lim_theta: 2.0           # (double) [rad/s²] Allow the robot to establish a forward-facing heading quickly

  # 5.2 Car-like / Ackermann Settings
  min_turning_radius: 0        # (double) [m] Minimum turning radius (0 for differential drive)
  wheelbase: 0.8               # (double) [m] Distance between front and rear axles (for car-like robots)
  cmd_angle_instead_rotvel: false  # (bool) Interpret cmd_vel/angular/z as steering angle instead of angular velocity

  ##################################
  # 6. Robot Footprint
  ##################################
  footprint_model:
    type: "polygon"                            # (string) Model type: "point", "circular", "two_circles", "line", "polygon"
    vertices:                                  # (array) List of [x, y] vertices (relative to robot center), automatically closed
      - [ 0.4,  0.25]
      - [ 0.4, -0.25]
      - [-0.4, -0.25]
      - [-0.4,  0.25]
  is_footprint_dynamic: false                  # (bool) If true, footprint may change dynamically (e.g., moving manipulator)

  ##################################
  # 7. Goal Tolerance
  ##################################
  xy_goal_tolerance: 0.3        # (double) [m] Acceptable planar distance to goal
  yaw_goal_tolerance: 0.785     # (double) [rad] Acceptable yaw difference to goal (~90°)
  free_goal_vel: false          # (bool) If false, goal velocity must be zero; prevents “full-speed rush” through goal

  ##################################
  # 8. Obstacle Handling
  ##################################
  min_obstacle_dist: 0.15             # (double) [m] Hard polygon-footprint clearance used by final static and dynamic feasibility checks
  include_costmap_obstacles: true     # (bool) Use local costmap obstacles in optimization
  costmap_obstacles_behind_robot_dist: 3.0  # (double) [m] Retain side/rear obstacles for holonomic and reverse motion

  obstacle_poses_affected: 30         # (int) Number of trajectory poses affected by each obstacle point
  inflation_dist: 0.8                 # (double) [m] Static soft buffer prevents wall-hugging before feasibility rejection
  dynamic_obstacle_inflation_dist: 0.8 # (double) [m] Start reacting before a moving polygon reaches the hard-clearance zone

  include_dynamic_obstacles: true     # (bool) Consider external dynamic obstacles (requires publishing obstacle msgs)
  obstacle_keypoint_offset: 0.1       # (double) [m] Offset from footprint for “keypoint” collision checks
  obstacle_heading_threshold: 0.45    # (double) [rad] Ignore obstacles outside this angular threshold (~25°)

  obstacle_association_cutoff_factor: 8.0           # (double) Keep nearby corner geometry in the optimization
  obstacle_association_force_inclusion_factor: 3.0  # (double) Force include obstacles within 0.6 m at current min distance
  legacy_obstacle_association: false                # (bool) Use old (slower) obstacle association method if true
  obstacle_proximity_ratio_max_vel: 1.0             # (double) Recover full speed only after leaving the wall-proximity zone
  obstacle_proximity_lower_bound: 0.15              # (double) [m] Reduce commanded speed to zero at the hard clearance boundary
  obstacle_proximity_upper_bound: 0.8               # (double) [m] Smoothly restore full speed with increasing wall clearance

  ##################################
  # 9. Optimization Parameters
  ##################################
  no_inner_iterations: 5              # (int) Number of inner optimization iterations (per outer loop)
  no_outer_iterations: 4              # (int) Number of outer optimization iterations
  optimization_activate: true         # (bool) Enable trajectory optimization
  optimization_verbose: false         # (bool) Print detailed optimization info to console
  penalty_epsilon: 0.05               # (double) Must remain below max_vel_x_backwards

  # Kinematic Constraints & Weights
  weight_max_vel_x: 2.0                # (double) Penalty weight for exceeding max_vel_x
  weight_max_vel_y: 2.0                # (double) Penalty weight for exceeding max_vel_y
  weight_max_vel_theta: 1.0            # (double) Penalty weight for exceeding max_vel_theta

  weight_acc_lim_x: 1.0                # (double) Penalty weight for exceeding acc_lim_x
  weight_acc_lim_y: 1.0                # (double) Penalty weight for exceeding acc_lim_y
  weight_acc_lim_theta: 2.0            # (double) Penalty weight for exceeding acc_lim_theta

  weight_kinematics_nh: 80.0           # (double) Prefer turn-and-forward motion without blocking timely lateral avoidance
  weight_kinematics_forward_drive: 1000.0 # (double) Keep forward motion strongly preferred over reverse
  weight_kinematics_turning_radius: 1.0 # (double) Weight for respecting min_turning_radius (Ackermann)

  # Obstacle & Inflation Weights
  weight_obstacle: 80.0                # (double) Stronger static-obstacle penalty reduces corner cutting
  weight_inflation: 8.0                # (double) Prefer usable corridor center instead of grazing a wall
  weight_dynamic_obstacle: 80.0         # (double) Keep predicted collisions expensive without making waiting dominant
  weight_dynamic_obstacle_inflation: 1.5 # (double) Begin spatial avoidance before the predicted hard collision
  weight_velocity_obstacle_ratio: 100.0  # (double) Enforce speed reduction when approaching static walls

  # Time & Path Costs
  weight_optimaltime: 8.0             # (double) Make prolonged waiting/reversing costlier than an available spatial bypass
  weight_shortest_path: 0.0           # (double) Weight for minimizing trajectory length (0: ignore)
  weight_viapoint: 3.0               # (double) Follow the global route without forcing the local path against walls
  selection_alternative_time_cost: true  # (bool) Compare candidate transition time so waiting is not always preferred

  ##################################
  # 10. Homotopy Class Planner (HCP)
  ##################################
  enable_homotopy_class_planning: true       # (bool) Generate spatial alternatives around dynamic obstacles
  enable_multithreading: true               # (bool) Run homotopy and obstacle association in separate threads
  max_number_classes: 3                     # (int) Bound CPU cost while retaining left/right/global-plan candidates
  h_signature_prescaler: 0.5                # (double) Scale factor for homotopy signature computation
  h_signature_threshold: 0.1                # (double) Threshold to consider two signatures equivalent

  selection_cost_hysteresis: 0.8             # (double) Keep the selected left/right side unless another class is clearly better
  selection_prefer_initial_plan: 1.0         # (double) Do not discount the blocked initial/global-plan class
  selection_obst_cost_scale: 10.0            # (double) Strongly prefer a clear left/right bypass over waiting on the blocked class
  selection_viapoint_cost_scale: 1.0         # (double) Scale factor for via-point cost in homotopy selection
  switching_blocking_period: 2.0             # (double) [s] Prevent rapid left/right class switching during an avoidance maneuver

  simple_exploration: true                   # (bool) Deterministically generate left/right candidates around dynamic obstacles
  viapoints_all_candidates: false            # (bool) Let alternative classes leave the global line to pass obstacles
  roadmap_graph_no_samples: 15               # (int) Number of samples for roadmap-based initial guesses
  roadmap_graph_area_width: 5.0              # (double) Width [m] of sampling area for roadmap
  obstacle_keypoint_offset: 0.1              # (double) [m] Offset for generating obstacle keypoints
  obstacle_heading_threshold: 0.45           # (double) [rad] Angular threshold for ignoring obstacles outside field-of-view

  ##################################
  # 11. Recovery & Oscillation Handling
  ##################################
  shrink_horizon_backup: false               # (bool) Try shrinking time horizon when no feasible solution
  shrink_horizon_min_duration: 10            # (double) [s] Minimum time horizon when shrinking (if above enabled)

  oscillation_recovery: true                 # (bool) Enable recovery behavior when oscillation detected
  oscillation_v_eps: 0.1                     # (double) [m/s] Velocity threshold for detecting oscillation
  oscillation_omega_eps: 0.1                 # (double) [rad/s] Angular velocity threshold for detecting oscillation
  oscillation_filter_duration: 10            # (int) Number of iterations to monitor for oscillation
  oscillation_recovery_min_duration: 10      # (int) Minimum iterations to wait before another recovery

  ##################################
  # 12. Costmap Converter & Roadmap
  ##################################
  costmap_converter_rate: 5                  # (int) [Hz] Frequency to run costmap_converter (convert obstacles to polygons)
  costmap_converter_spin_thread: true        # (bool) Run costmap_converter in a separate thread for efficiency

  roadmap_graph_area_length_scale: 1.0        # (double) Scale factor for length of roadmap sampling area
  roadmap_graph_area_width: 5.0               # (double) Width [m] of roadmap sampling area (duplicate of above if needed)
  roadmap_graph_no_samples: 15                # (int) Number of samples for roadmap approach (duplicate entry if needed)

  ##################################
  # 13. Miscellaneous Settings
  ##################################
  cmd_angle_instead_rotvel: false             # (bool) Publish steering angle instead of rotational velocity (for specific controllers)
