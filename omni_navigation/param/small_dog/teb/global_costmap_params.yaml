global_costmap:
  global_frame: map
  robot_base_frame: base_link
  transform_tolerance: 0.5


  update_frequency: 5.0
  publish_frequency: 5.0

  plugins:
    - {name: static_layer,    type: "costmap_2d::StaticLayer"}
    # - {name: obstacle_layer,  type: "costmap_2d::ObstacleLayer"}
    - {name: inflation_layer, type: "costmap_2d::InflationLayer"}


  inflation_layer:
    enabled:              true
    cost_scaling_factor:  5.0  # prefer centered global paths while preserving narrow-passage feasibility
    inflation_radius:     0.65  # avoid blocking corridors before the local planner can optimize through them

 
