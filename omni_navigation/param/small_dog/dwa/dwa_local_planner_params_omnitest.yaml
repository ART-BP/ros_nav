DWAPlannerROS:

  # Speed/accel limits for go2w (balanced for real robot navigation)
  max_vel_x: 0.7
  min_vel_x: 0.0

  max_vel_y: 0.0
  min_vel_y: 0.0

  max_vel_trans: 0.8
  min_vel_trans: 0.0

  max_vel_theta: 1.6
  min_vel_theta: 0.25

  acc_lim_x: 1.5
  acc_lim_y: 0.0
  acc_lim_trans: 1.5
  acc_lim_theta: 4.0

  # Goal tolerance
  xy_goal_tolerance: 0.20
  yaw_goal_tolerance: 0.25
  trans_stopped_vel: 0.05
  theta_stopped_vel: 0.10
  latch_xy_goal_tolerance: true

  # Forward simulation
  sim_time: 1.2
  sim_period: 0.1
  sim_granularity: 0.025
  angular_sim_granularity: 0.03
  vx_samples: 16
  vy_samples: 1
  vth_samples: 28
  controller_frequency: 8.0
  prune_plan: true

  # Trajectory scoring
  path_distance_bias: 24.0
  goal_distance_bias: 28.0
  occdist_scale: 0.08
  forward_point_distance: 0.12
  stop_time_buffer: 0.16
  scaling_speed: 0.70
  max_scaling_factor: 0.08
  twirling_scale: 0.0
  penalize_negative_x: true

  # Oscillation prevention
  oscillation_reset_dist: 0.12

  # Debug
  publish_traj_pc: false
  publish_cost_grid_pc: false
