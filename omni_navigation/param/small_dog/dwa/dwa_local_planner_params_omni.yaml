DWAPlannerROS:

  # Speed/accel limits for go2w (balanced for real robot navigation)
  max_vel_x: 0.8
  min_vel_x: -0.10

  max_vel_y: 0.0
  min_vel_y: 0.0

  max_vel_trans: 0.8
  min_vel_trans: 0.10

  max_vel_theta: 1.0
  min_vel_theta: 0.2

  acc_lim_x: 1.5
  acc_lim_y: 0.0
  acc_lim_trans: 1.5
  acc_lim_theta: 2.0

  # Goal tolerance
  xy_goal_tolerance: 0.20
  yaw_goal_tolerance: 0.25
  trans_stopped_vel: 0.05
  theta_stopped_vel: 0.10
  latch_xy_goal_tolerance: true

  # Forward simulation
  sim_time: 2.0
  sim_period: 0.1
  sim_granularity: 0.025
  angular_sim_granularity: 0.03
  vx_samples: 24
  vy_samples: 1
  vth_samples: 30
  controller_frequency: 10.0
  prune_plan: true

  # Trajectory scoring
  path_distance_bias: 20.0
  goal_distance_bias: 24.0
  occdist_scale: 0.04
  forward_point_distance: 0.35
  stop_time_buffer: 0.25
  scaling_speed: 0.45
  max_scaling_factor: 0.15
  twirling_scale: 0.0
  penalize_negative_x: true

  # Oscillation prevention
  oscillation_reset_dist: 0.10

  # Debug
  publish_traj_pc: true
  publish_cost_grid_pc: true
